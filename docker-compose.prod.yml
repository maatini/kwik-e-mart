services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: kwik_e_mart_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./kwik_e_mart
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres/kwik_e_mart_prod
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:?PHX_HOST required}
      PORT: 4000
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE required}
      MIX_ENV: prod
    command: ["/app/bin/kwik_e_mart", "start"]

volumes:
  postgres_data:
