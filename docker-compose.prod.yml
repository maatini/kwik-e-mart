services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: kwik_e_mart_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./kwik_e_mart
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres/kwik_e_mart_prod
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:?PHX_HOST required}
      PORT: 4000
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      MIX_ENV: prod
    # Migrations vor dem Start ausführen
    command: >
      /bin/sh -c "
        /app/bin/kwik_e_mart eval 'KwikEMart.Release.migrate()' &&
        /app/bin/kwik_e_mart start
      "
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
